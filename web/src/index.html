<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Federated Learning Monitor</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header-left">
                <h1 class="title">Federated Learning Monitor</h1>
                <span class="badge" id="mode-badge">-</span>
            </div>
            <div class="header-center">
                <span class="round-display" id="round-display">Round -/-</span>
            </div>
            <div class="header-right">
                <span class="connection-status" id="connection-status">
                    <span class="dot"></span>
                    <span class="text">Disconnected</span>
                </span>
            </div>
        </header>
        <main class="main">
            <aside class="sidebar">
                <div class="card topology-card">
                    <h2 class="card-title">Node Topology</h2>
                    <canvas id="topology-canvas"></canvas>
                    <div class="tooltip" id="topology-tooltip" style="display:none;"></div>
                </div>
            </aside>
            <div class="content">
                <div class="card charts-card">
                    <h2 class="card-title">Training Metrics</h2>
                    <div class="charts-grid">
                        <div id="loss-chart" class="chart-container"></div>
                        <div id="acc-chart" class="chart-container"></div>
                    </div>
                </div>
                <div class="card clients-card">
                    <h2 class="card-title">Client Status</h2>
                    <div class="table-wrapper">
                        <table id="client-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Status</th>
                                    <th>Progress</th>
                                    <th>Loss</th>
                                    <th>Accuracy</th>
                                    <th>Network</th>
                                </tr>
                            </thead>
                            <tbody id="client-tbody"></tbody>
                        </table>
                    </div>
                </div>
                <div class="card events-card">
                    <div class="log-header">
                        <h2 class="card-title">Key Events</h2>
                        <div class="log-controls">
                            <select id="log-level-filter" aria-label="Log level">
                                <option value="">All Levels</option>
                                <option value="DEBUG">Debug</option>
                                <option value="INFO" selected>Info</option>
                                <option value="ERROR">Error</option>
                                <option value="CRITICAL">Critical</option>
                            </select>
                            <select id="log-category-filter" aria-label="Log category">
                                <option value="">All Categories</option>
                                <option value="network">Network</option>
                                <option value="training">Training</option>
                                <option value="control">Control</option>
                                <option value="topology">Topology</option>
                                <option value="system">System</option>
                            </select>
                            <input id="log-source-filter" type="search" placeholder="Source" aria-label="Log source">
                            <input id="log-regex-filter" type="search" placeholder="Regex" aria-label="Log regex">
                        </div>
                    </div>
                    <div class="event-log" id="event-log"></div>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="/static/dashboard.js"></script>
</body>
</html>
