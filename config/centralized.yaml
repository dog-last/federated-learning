mode: centralized

model:
  name: "simple_cnn"
  input_channels: 1
  num_classes: 10

dataset:
  name: "mnist"
  data_dir: "./data"
  num_clients: 3
  partition_strategy: "iid"
  alpha: 0.5

training:
  rounds: 10
  epochs_per_round: 2
  learning_rate: 0.01
  batch_size: 32
  momentum: 0.9
  weight_decay: 0.0001
  early_stopping:
    enabled: false
    patience: 5
    min_delta: 0.001
    monitor: "accuracy"  # "accuracy" or "loss"
    mode: "max"  # "max" for accuracy, "min" for loss

server:
  host: "0.0.0.0"
  port: 9000
  address: "127.0.0.1"
  timeouts:
    connect: 10.0
    send: 30.0
    recv: 120.0
    round: 180.0

clients:
  nodes:
    - { id: 1, host: "127.0.0.1" }
    - { id: 2, host: "127.0.0.1" }
    - { id: 3, host: "127.0.0.1" }

aggregator:
  name: "fedavg"

logging:
  level: "INFO"
  log_dir: "./logs"
  console_output: true
  file_output: true

output:
  checkpoint_dir: "./outputs/checkpoints"
  figure_dir: "./outputs/figures"
  save_checkpoint_every: 5
